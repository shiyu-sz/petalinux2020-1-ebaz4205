#User Configuration

#OE_TERMINAL = "tmux"

# Offline build inputs.  Keep downloaded source archives in the shared local
# mirror and reject any fetch that would require network access.
DL_DIR = "${HOME}/sstate_aarch64_2020.1/downloads"
SSTATE_DIR = "${HOME}/sstate_aarch64_2020.1/arm"
SOURCE_MIRROR_URL = "file://${HOME}/sstate_aarch64_2020.1/downloads"
PREMIRRORS = "\
git://.*/.* file://${HOME}/sstate_aarch64_2020.1/downloads \n \
ftp://.*/.* file://${HOME}/sstate_aarch64_2020.1/downloads \n \
http://.*/.* file://${HOME}/sstate_aarch64_2020.1/downloads \n \
https://.*/.* file://${HOME}/sstate_aarch64_2020.1/downloads \n"
BB_NO_NETWORK = "1"
